[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 800
via_ir = false
ffi = true

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
unichain_sepolia = "${UNICHAIN_SEPOLIA_RPC}"

[etherscan]
unichain_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://sepolia.uniscan.xyz/api" }
